services:
  frontend:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./site:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - frontend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MYSQL_HOST: database
      MYSQL_DATABASE: my_database
      MYSQL_USER_FILE: /run/secrets/user
      MYSQL_PASSWORD_FILE: /run/secrets/secret

    secrets:
      - user
      - secret
    networks:
      - backend
      - frontend
  database:
    image: mariadb:latest
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/root_secret
      MYSQL_DATABASE: my_database
      MYSQL_USER_FILE: /run/secrets/user
      MYSQL_PASSWORD_FILE: /run/secrets/secret
    
    secrets:
      - root_secret
      - user
      - secret

    networks:
      - backend

secrets:
  root_secret:
    file: ./secrets/root_secret 
  user:
    file: ./secrets/user
  secret:
    file: ./secrets/secret

networks:
  frontend: {}
  backend: {}